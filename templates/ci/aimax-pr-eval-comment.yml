name: aimax-pr-eval-comment

on:
  workflow_run:
    workflows: ["aimax-evolution-gates"]
    types: [completed]

permissions:
  actions: read
  checks: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-eval-comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Post gate summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- aimax-pr-eval-comment -->';
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (!prs.length) {
              core.info('No pull request linked to this workflow run, skip.');
              return;
            }

            const prNumber = prs[0].number;
            const { owner, repo } = context.repo;

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              { owner, repo, run_id: run.id, per_page: 100 }
            );

            const gateJobs = jobs.filter((job) => {
              const name = (job.name || '').toLowerCase();
              if (name.includes('detect-stack')) return false;
              if (name.includes('summary')) return false;
              return true;
            });

            const counts = {
              success: 0,
              failure: 0,
              cancelled: 0,
              skipped: 0,
              neutral: 0,
              other: 0
            };

            for (const job of gateJobs) {
              const c = (job.conclusion || '').toLowerCase();
              if (c in counts) counts[c] += 1;
              else counts.other += 1;
            }

            const hasFailure = counts.failure > 0;
            const statusIcon = hasFailure ? '🔴' : '✅';
            const statusText = hasFailure ? '存在未通过门禁' : '所有门禁通过';

            const rows = gateJobs.map((job) => {
              const conclusion = job.conclusion || job.status || 'unknown';
              const icon =
                conclusion === 'success' ? '✅' :
                conclusion === 'failure' ? '❌' :
                conclusion === 'skipped' ? '⏭️' :
                conclusion === 'cancelled' ? '🛑' : '⚪';

              return `| ${job.name} | ${icon} ${conclusion} |`;
            }).join('\n');

            const nextStep = hasFailure
              ? [
                  '1. 先修复失败门禁对应的模块（构建/测试/lint）。',
                  '2. 运行 `/aimax:evolve` 执行失败恢复（微调 -> 替代方案 -> 回滚建议）。',
                  '3. 修复后重新触发 CI，确认回归为 0。'
                ]
              : [
                  '1. 继续执行 `/aimax:evolve` 进入下一轮小步优化。',
                  '2. 如需提升稳定性，补充回归测试与评估集。'
                ];

            const body = [
              marker,
              '## 🤖 AI MAX PR 评估摘要',
              '',
              `${statusIcon} **结论**: ${statusText}`,
              '',
              `- Workflow: \`${run.name}\``,
              `- Run: [#${run.run_number}](${run.html_url})`,
              `- SHA: \`${run.head_sha.slice(0, 7)}\``,
              '',
              '### 门禁统计',
              `- ✅ success: ${counts.success}`,
              `- ❌ failure: ${counts.failure}`,
              `- ⏭️ skipped: ${counts.skipped}`,
              `- 🛑 cancelled: ${counts.cancelled}`,
              `- ⚪ other: ${counts.neutral + counts.other}`,
              '',
              '### 任务明细',
              '| Job | Status |',
              '|---|---|',
              rows || '| (no gate jobs) | - |',
              '',
              '### 建议下一步',
              ...nextStep.map((s) => `- ${s}`)
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber, per_page: 100 }
            );

            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated existing PR eval comment: ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
              core.info(`Created PR eval comment: ${created.data.id}`);
            }
